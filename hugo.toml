baseURL = 'https://whycanttheyjust.com.au/'
locale = 'en-us'
title = "Policy for People"
theme = 'castanet'
pagination.pagerSize = "9"

[taxonomies]
  series = "series"
  tag = "tags"

# The theme supports menus with up to one submenu per menu item
# The menu name must be "Main"
# The menus are sorted based upon their identifier
[[Menu.Main]]
    name = "Our podcast: Why Can't They Just?"
    identifier = "podcast"
    url = "/podcast"

[[Menu.Main]]
    name = "Who we are"
    identifier = "zhosts"
    url = "/host"

[params]
googleAnalytics_UA = ""
mainSections = ["podcast"]
episode_number_style  = "brackets"
episode_number_prefix = ""
site_theme = "grey"
# site_layout = "grid"
site_layout = "row"
show_next_upcoming = "true"
enable_jumbo = "true"
disable_title_caps = "true"
# truncate = "100"
about_logo = "img/202605_WCTJ_Thumbnail.jpg"
copyright_notice = "Copyright 2026 Policy 4 People"
custom_css = ["css/custom.css"]
youtube_subscribe = "https://www.youtube.com/@Whycanttheyjust"
itunes_subscribe = "https://podcasts.apple.com/au/podcast/why-cant-they-just/id1818980418"
spotify_subscribe = "https://open.spotify.com/show/25CCUaugraLCHtUn4dGmz7"
disqusShortname = ""

  [params.author]
    name = "Janaline Oh"
    email = "janaline.oh@gmail.com"

  # Social links can be given in full URL form or short form
  # In the short form the theme will generate a relevant URL
  [params.social]
    facebook = "61576913427124"
    instagram = "whycanttheyjust"
    youtube = "@Whycanttheyjust"

    [params.links]
      [params.links.ado]
        name = "Arrested DevOps"
        url = "https://www.arresteddevops.com"
      [params.links.ffs]
        name = "Food Fight Show"
        url = "https://foodfightshow.org"
      [params.links.sdt]
        name = "Software Defined Talk"
        url = "https://cote.io/podcasts/sdt/"

[markup.goldmark.renderer]
    unsafe = true

[caches]
  [caches.images]
    dir = ':cacheDir/images'
